name: Deploy GodMode User

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username (lowercase, no spaces)"
        required: true
        type: string
      email:
        description: "User's Google email (AllowedEmail)"
        required: true
        type: string
      anthropic_key:
        description: "Anthropic API key for this user"
        required: true
        type: string
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"
        type: string

jobs:
  provision:
    name: Provision user server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision user
        env:
          GODMODE_RG: godmode-rg
          GODMODE_ACA_ENV: godmode-env
          GODMODE_STORAGE_ACCOUNT: godmodestorage
          GODMODE_IMAGE: ghcr.io/johnjuuljensen/godmode:${{ inputs.image_tag }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ github.repository_owner }}
        run: |
          chmod +x scripts/provision-user.sh
          ./scripts/provision-user.sh \
            "${{ inputs.username }}" \
            "${{ inputs.email }}" \
            "${{ inputs.anthropic_key }}"

      - name: Output deployment URL
        run: |
          FQDN=$(az containerapp show \
            --name "godmode-${{ inputs.username }}" \
            --resource-group godmode-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**User:** ${{ inputs.email }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$FQDN" >> $GITHUB_STEP_SUMMARY
