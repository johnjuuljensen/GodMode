name: Update All GodMode Instances

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to roll out"
        required: false
        default: "latest"
        type: string

jobs:
  update-all:
    name: Roll out to all instances
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Update all instances
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          IMAGE="ghcr.io/johnjuuljensen/godmode:$IMAGE_TAG"
          RG=godmode-rg

          echo "Rolling out $IMAGE to all instances..."

          APPS=$(az containerapp list \
            --resource-group $RG \
            --query "[?starts_with(name, 'godmode-')].name" -o tsv)

          if [ -z "$APPS" ]; then
            echo "No GodMode instances found in $RG"
            exit 0
          fi

          SUCCESS=0
          FAIL=0

          for APP in $APPS; do
            echo -n "  Updating $APP... "
            if az containerapp update \
              --name "$APP" \
              --resource-group "$RG" \
              --image "$IMAGE" \
              --output none 2>&1; then
              echo "ok"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "FAILED"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Done: $SUCCESS updated, $FAIL failed"

          echo "### Rollout Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
          echo "**Updated:** $SUCCESS instances" >> $GITHUB_STEP_SUMMARY
          if [ $FAIL -gt 0 ]; then
            echo "**Failed:** $FAIL instances" >> $GITHUB_STEP_SUMMARY
          fi

          [ $FAIL -eq 0 ] || exit 1
