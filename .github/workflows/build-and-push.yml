name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            echo "runtime_tags=ghcr.io/${REPO}:latest,ghcr.io/${REPO}:${TAG}" >> $GITHUB_OUTPUT
            echo "sdk_tags=ghcr.io/${REPO}:sdk,ghcr.io/${REPO}:${TAG}-sdk" >> $GITHUB_OUTPUT
          else
            echo "runtime_tags=ghcr.io/${REPO}:latest" >> $GITHUB_OUTPUT
            echo "sdk_tags=ghcr.io/${REPO}:sdk" >> $GITHUB_OUTPUT
          fi

      # Build + push the runtime variant (stage `runtime`) as the default/:latest
      # tag, and the sdk variant (stage `sdk`) as `:sdk`. The second build reuses
      # layers from the first via the local docker daemon cache within this run,
      # so the sdk build is mostly just the incremental apt install on top.
      - name: Build and push runtime
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/GodMode.Server/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.runtime_tags }}

      - name: Build and push sdk
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/GodMode.Server/Dockerfile
          target: sdk
          push: true
          tags: ${{ steps.meta.outputs.sdk_tags }}
