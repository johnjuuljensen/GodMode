name: Build and Push Docker Image

on:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tags=ghcr.io/${REPO}:latest,ghcr.io/${REPO}:${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/${REPO}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/GodMode.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
