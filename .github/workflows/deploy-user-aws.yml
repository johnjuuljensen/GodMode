name: Deploy GodMode User (AWS)

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Username (lowercase, no spaces)"
        required: true
        type: string
      email:
        description: "User's Google email (AllowedEmail)"
        required: true
        type: string
      anthropic_key:
        description: "Anthropic API key for this user"
        required: true
        type: string
      image_tag:
        description: "Docker image tag to deploy"
        required: false
        default: "latest"
        type: string

permissions:
  contents: read

jobs:
  provision:
    name: Provision on AWS ECS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Validate inputs
        env:
          INPUT_USERNAME: ${{ inputs.username }}
          INPUT_EMAIL: ${{ inputs.email }}
        run: |
          if ! echo "$INPUT_USERNAME" | grep -qE '^[a-z0-9][a-z0-9-]{0,30}$'; then
            echo "::error::Invalid username."
            exit 1
          fi
          if ! echo "$INPUT_EMAIL" | grep -qE '^[^@]+@[^@]+\.[^@]+$'; then
            echo "::error::Invalid email."
            exit 1
          fi

      - name: Provision user
        env:
          INPUT_USERNAME: ${{ inputs.username }}
          INPUT_EMAIL: ${{ inputs.email }}
          INPUT_ANTHROPIC_KEY: ${{ inputs.anthropic_key }}
          GODMODE_IMAGE: ghcr.io/johnjuuljensen/godmode:${{ inputs.image_tag }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GODMODE_ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'godmode-cluster' }}
          GODMODE_EXECUTION_ROLE: ${{ secrets.AWS_EXECUTION_ROLE_ARN }}
          GODMODE_SUBNET_IDS: ${{ vars.SUBNET_IDS }}
          GODMODE_SECURITY_GROUP: ${{ vars.SECURITY_GROUP }}
          GODMODE_SECRET_ARN_GOOGLE_SECRET: ${{ secrets.AWS_SECRET_ARN_GOOGLE }}
          GODMODE_SECRET_ARN_ANTHROPIC: ${{ secrets.AWS_SECRET_ARN_ANTHROPIC }}
        run: |
          chmod +x scripts/provision-user-aws.sh
          ./scripts/provision-user-aws.sh \
            "$INPUT_USERNAME" \
            "$INPUT_EMAIL" \
            "$INPUT_ANTHROPIC_KEY"
